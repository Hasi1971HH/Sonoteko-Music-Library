name: macOS App bauen

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: App bauen
        run: |
          pyinstaller HasisTagEditor.spec

      - name: ZIP erstellen
        run: |
          cd dist
          zip -r "../Hasis-ID3-Tag-Editor-macOS.zip" "Hasi's ID3-Tag-Editor.app"

      - name: ZIP als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Hasis-ID3-Tag-Editor-macOS
          path: Hasis-ID3-Tag-Editor-macOS.zip

      - name: Release erstellen (bei Tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Hasis-ID3-Tag-Editor-macOS.zip
          generate_release_notes: true
