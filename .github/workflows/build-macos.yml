name: Sonoteko macOS App bauen

on:
  push:
    tags:
      - 'V*'
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Icon konvertieren (SVG → ICNS)
        run: |
          pip install cairosvg
          mkdir -p assets/icon.iconset
          for size in 16 32 64 128 256 512; do
            cairosvg assets/icon.svg -o assets/icon.iconset/icon_${size}x${size}.png -W $size -H $size
            cairosvg assets/icon.svg -o assets/icon.iconset/icon_${size}x${size}@2x.png -W $((size*2)) -H $((size*2))
          done
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

      - name: App bauen
        run: |
          pyinstaller Sonoteko.spec

      - name: ZIP erstellen
        run: |
          cd dist
          zip -r "../Sonoteko-macOS.zip" "Sonoteko.app"

      - name: ZIP als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Sonoteko-macOS
          path: Sonoteko-macOS.zip

      - name: Release erstellen (bei Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Sonoteko-macOS.zip
          generate_release_notes: true
