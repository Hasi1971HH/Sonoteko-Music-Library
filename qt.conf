; qt.conf – placed next to the HasisTagEditor executable inside the .app bundle.
;
; Qt searches for qt.conf in the executable's directory *before* it falls back
; to CFBundleGetMainBundle().  Having this file present (even with a minimal
; [Paths] section) is sufficient to prevent the CFBundle lookup that causes the
; PAC-signature crash on macOS 15+ / 26.x when running a PyInstaller bundle.
;
; The Prefix is intentionally set to "." so Qt resolves resources relative to
; the executable directory.  QT_PLUGIN_PATH (set at runtime in main.py for
; frozen builds) overrides the plugin sub-path, so plugins are still found
; regardless of the exact PyInstaller directory layout.
[Paths]
Prefix = .
